name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'live/**'
      - '.github/workflows/**'

env:
  ACR_NAME: contrailregistry
  IMAGE: contrail-live
  RESOURCE_GROUP: contrail_observatory
  PIPELINE_CONTAINER: contrail-pipeline
  SERVER_CONTAINER: contrails-server
  CONTAINERAPP_ENV: contrail-env

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image to ACR
        run: |
          az acr login --name $ACR_NAME
          docker build -t $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }} \
                       -t $ACR_NAME.azurecr.io/$IMAGE:latest .
          docker push $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE:latest

      - name: Deploy pipeline container
        run: |
          az container create \
            --resource-group $RESOURCE_GROUP \
            --name $PIPELINE_CONTAINER \
            --image $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }} \
            --registry-login-server $ACR_NAME.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --os-type Linux \
            --cpu 2 --memory 4 \
            --restart-policy Always \
            --environment-variables \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}" \
            --azure-file-volume-account-name contrailimages \
            --azure-file-volume-account-key "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
            --azure-file-volume-share-name contrail-data \
            --azure-file-volume-mount-path /app/live_output \
            --command-line "python -m live.main --config live/config.yaml" \
            --output table

      - name: Deploy server to Container Apps
        run: |
          az containerapp update \
            --name $SERVER_CONTAINER \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }} \
            --registry-server $ACR_NAME.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }}
