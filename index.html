<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contrail Observatory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: ui-monospace, monospace; margin: 0; padding: 16px; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    h1 { margin: 0; font-size: 1.4rem; color: #e6edf3; }
    .stats { display: flex; gap: 16px; margin-left: auto; }
    .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px 16px; text-align: center; }
    .stat .val { font-size: 1.6rem; font-weight: bold; color: #e6edf3; }
    .stat.highlight .val { color: #f0a030; }
    .stat .lbl { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }

    nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .nav-btn { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; color: #c9d1d9; cursor: pointer; font-family: inherit; font-size: inherit; }
    .nav-btn:hover:not(:disabled) { background: #30363d; }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }
    select { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 14px; color: #c9d1d9; font-family: inherit; font-size: 1rem; cursor: pointer; }
    .filter-btn { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; color: #8b949e; cursor: pointer; font-family: inherit; font-size: inherit; margin-left: auto; }
    .filter-btn:hover { background: #30363d; }
    .filter-btn.active { background: #3d2b00; border-color: #f0a030; color: #f0a030; }

    .frames { display: flex; flex-direction: column; gap: 20px; }
    .frame-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    .frame-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #21262d; border-bottom: 1px solid #30363d; cursor: pointer; user-select: none; }
    .frame-header:hover { background: #2d333b; }
    .time { font-size: 1rem; font-weight: bold; color: #e6edf3; }
    .side-badge { background: #1f6feb; color: #fff; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; text-transform: uppercase; }
    .header-hint { margin-left: auto; font-size: 0.7rem; color: #8b949e; }
    .frame-card img { display: block; width: 100%; max-height: 480px; object-fit: contain; background: #000; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { padding: 8px 16px; text-align: left; color: #8b949e; font-weight: normal; border-bottom: 1px solid #30363d; }
    td { padding: 8px 16px; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    tr.contrail-row td { background: rgba(240,160,48,0.06); }
    .badge { border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; }
    .badge.contrail { background: #3d2b00; color: #f0a030; }
    .badge.no-contrail { background: #1c2128; color: #8b949e; }
    .empty { color: #8b949e; padding: 32px; text-align: center; }
    code { background: #1c2128; padding: 1px 5px; border-radius: 3px; }

    #status { color: #8b949e; padding: 32px; text-align: center; }

    /* Modal */
    #modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modal-backdrop.open { display: flex; }
    #modal-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      max-width: min(1200px, 100%);
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #modal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #modal-title { font-weight: bold; color: #e6edf3; flex: 1; }
    #modal-close {
      background: none; border: none; color: #8b949e; cursor: pointer;
      font-size: 1.1rem; padding: 2px 6px; border-radius: 4px;
      font-family: inherit;
    }
    #modal-close:hover { background: #30363d; color: #e6edf3; }
    #modal-img-wrap {
      position: relative;
      overflow: auto;
      flex: 1;
      background: #000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    #modal-img-wrap > .img-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    #modal-img { display: block; max-width: 100%; height: auto; }
    #modal-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contrail Observatory</h1>
    <div class="stats">
      <div class="stat">
        <div class="val" id="stat-total">—</div>
        <div class="lbl">Aircraft tracked</div>
      </div>
      <div class="stat highlight">
        <div class="val" id="stat-contrail">—</div>
        <div class="lbl">Contrailing</div>
      </div>
    </div>
  </header>

  <nav>
    <button class="nav-btn" id="btn-prev" disabled></button>
    <select id="date-select"></select>
    <button class="nav-btn" id="btn-next" disabled></button>
    <button class="filter-btn" id="btn-filter">Show contrails only</button>
  </nav>

  <div id="status">Loading…</div>
  <div class="frames" id="frames"></div>

  <!-- Modal -->
  <div id="modal-backdrop">
    <div id="modal-box">
      <div id="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-img-wrap">
        <div class="img-container">
          <img id="modal-img" src="" alt="Camera frame">
          <svg id="modal-svg" viewBox="0 0 2592 1944" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Point this at your running FastAPI server.
    const API = "https://contrails-server.greenisland-ce3c2a2f.eastus.azurecontainerapps.io";
    const CAM_BASE = "https://metobs.ssec.wisc.edu/pub/cache/aoss/cameras";

    let availableDates = [];
    let currentDate = null;
    let currentFrames = [];
    let showContrailsOnly = false;

    const elStatus     = document.getElementById("status");
    const elFrames     = document.getElementById("frames");
    const elSelect     = document.getElementById("date-select");
    const elPrev       = document.getElementById("btn-prev");
    const elNext       = document.getElementById("btn-next");
    const elStatTotal  = document.getElementById("stat-total");
    const elStatContr  = document.getElementById("stat-contrail");
    const elFilter     = document.getElementById("btn-filter");
    const elBackdrop   = document.getElementById("modal-backdrop");
    const elModalTitle = document.getElementById("modal-title");
    const elModalImg   = document.getElementById("modal-img");
    const elModalSvg   = document.getElementById("modal-svg");
    const elModalClose = document.getElementById("modal-close");

    function cameraImageUrl(ts, side) {
      // Ensure ts is parsed as UTC (API returns "YYYY-MM-DD HH:MM:SS" without Z)
      const d = new Date(ts.includes("Z") || ts.includes("+") ? ts : ts.replace(" ", "T") + "Z");
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Chicago',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
      }).formatToParts(d);
      const p = Object.fromEntries(parts.map(x => [x.type, x.value]));
      const file = `${p.hour}_${p.minute}_${p.second}.trig+00.jpg`;
      const s = side.split(" ")[1].toLowerCase();
      return `${CAM_BASE}/${s}/img/${p.year}/${p.month}/${p.day}/orig/${file}`;
    }

    function openModal(frameIdx) {
      const frame = currentFrames[frameIdx];
      if (!frame) return;

      const ts = frame.timestamp ?? "";
      const side = frame.camera_name || "unknown";
      const timeDisplay = ts.length >= 19 ? ts.slice(11, 19) + " UTC" : ts;

      elModalTitle.textContent = `${timeDisplay}  ·  ${side}`;
      elModalImg.src = cameraImageUrl(ts, side);

      // Build SVG overlays for each aircraft
      const svgChildren = (frame.aircraft ?? []).map(ac => {
        const px = parseFloat(ac.px ?? -1);
        const py = parseFloat(ac.py ?? -1);
        if (px < 0 || py < 0 || px > 2592 || py > 1944) return "";
        const isContrail = ac.contrail === "1";
        const color = isContrail ? "#f0a030" : "#58a6ff";
        // Circle + label
        return `
          <circle cx="${px}" cy="${py}" r="18" fill="${color}" fill-opacity="0.25" stroke="${color}" stroke-width="3"/>
          <text x="${px + 24}" y="${py + 6}" fill="${color}" font-size="48" font-family="ui-monospace,monospace">${esc(ac.ident)}</text>`;
      }).join("");

      elModalSvg.innerHTML = svgChildren;
      elBackdrop.classList.add("open");
    }

    function closeModal() {
      elBackdrop.classList.remove("open");
      elModalImg.src = "";
      elModalSvg.innerHTML = "";
    }

    elModalClose.addEventListener("click", closeModal);
    elBackdrop.addEventListener("click", e => { if (e.target === elBackdrop) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // Event delegation for frame header clicks
    elFrames.addEventListener("click", e => {
      const header = e.target.closest(".frame-header[data-frame-idx]");
      if (header) openModal(parseInt(header.dataset.frameIdx, 10));
    });

    async function loadDates() {
      const res = await fetch(`${API}/api/dates`);
      if (!res.ok) throw new Error("Failed to load dates");
      const data = await res.json();
      availableDates = data.dates.slice().reverse(); // newest first

      elSelect.innerHTML = availableDates
        .map(d => `<option value="${d}">${d}</option>`)
        .join("");

      const hash = location.hash.slice(1);
      const initial = availableDates.includes(hash) ? hash : availableDates[0];
      if (initial) loadDay(initial);
    }

    async function loadDay(dateStr) {
      currentDate = dateStr;
      location.hash = dateStr;
      document.title = `Contrail Observatory — ${dateStr}`;

      elSelect.value = dateStr;
      elStatus.textContent = `Loading ${dateStr}…`;
      elFrames.innerHTML = "";
      elStatTotal.textContent = "—";
      elStatContr.textContent = "—";

      const idx = availableDates.indexOf(dateStr);
      elPrev.textContent = `← ${availableDates[idx + 1] ?? ""}`;
      elNext.textContent = `${availableDates[idx - 1] ?? ""} →`;
      elPrev.disabled = idx >= availableDates.length - 1;
      elNext.disabled = idx <= 0;

      try {
        const res = await fetch(`${API}/api/${dateStr}`);
        if (res.status === 404) {
          elStatus.textContent = `No detections logged for ${dateStr}.`;
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        elStatTotal.textContent = data.total_aircraft;
        elStatContr.textContent = data.contrail_aircraft;
        elStatus.textContent = "";
        currentFrames = data.frames;
        renderFrames();
      } catch (e) {
        elStatus.textContent = `Error: ${e.message}`;
      }
    }

    function renderFrames() {
      const indexed = currentFrames.map((f, i) => ({ frame: f, idx: i }));
      const visible = showContrailsOnly
        ? indexed.filter(({ frame }) => (frame.aircraft ?? []).some(ac => ac.contrail === "1"))
        : indexed;
      elFrames.innerHTML = visible.length
        ? visible.map(({ frame, idx }) => renderFrame(frame, idx)).join("")
        : `<div class="empty">No contrail frames found for this day.</div>`;
    }

    function renderFrame(frame, frameIdx) {
      const ts = frame.timestamp ?? "";
      const timeDisplay = ts.length >= 19 ? ts.slice(11, 19) + " UTC" : ts;
      const side = frame.camera_name || "unknown";

      const imgHtml = frame.image_url
        ? `<a href="${esc(frame.image_url)}" target="_blank"><img src="${esc(frame.image_url)}" alt="Annotated frame" loading="lazy"></a>`
        : "";

      const rows = (frame.aircraft ?? []).map(ac => {
        const isContrail = ac.contrail === "1";
        const badge = isContrail
          ? `<span class="badge contrail">contrail</span>`
          : `<span class="badge no-contrail">none</span>`;
        const altM = parseFloat(ac.alt_m ?? 0);
        const altFt = Math.round(altM * 3.28084).toLocaleString();
        const px = parseFloat(ac.px ?? 0).toFixed(0);
        const py = parseFloat(ac.py ?? 0).toFixed(0);
        return `<tr class="${isContrail ? "contrail-row" : ""}">
          <td><code>${esc(ac.ident)}</code></td>
          <td>${altM.toLocaleString(undefined, {maximumFractionDigits: 0})} m (${altFt} ft)</td>
          <td>(${px}, ${py})</td>
          <td>${badge}</td>
        </tr>`;
      }).join("");

      return `<div class="frame-card">
        <div class="frame-header" data-frame-idx="${frameIdx}">
          <span class="time">${esc(timeDisplay)}</span>
          <span class="side-badge">${esc(side)}</span>
          <span class="header-hint">click to view raw</span>
        </div>
        ${imgHtml}
        <table>
          <thead><tr><th>Flight</th><th>Altitude</th><th>Pixel</th><th>Contrail</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    elFilter.addEventListener("click", () => {
      showContrailsOnly = !showContrailsOnly;
      elFilter.classList.toggle("active", showContrailsOnly);
      elFilter.textContent = showContrailsOnly ? "Show all flights" : "Show contrails only";
      if (currentFrames.length) renderFrames();
    });

    elSelect.addEventListener("change", () => loadDay(elSelect.value));
    elPrev.addEventListener("click", () => {
      const idx = availableDates.indexOf(currentDate);
      if (idx < availableDates.length - 1) loadDay(availableDates[idx + 1]);
    });
    elNext.addEventListener("click", () => {
      const idx = availableDates.indexOf(currentDate);
      if (idx > 0) loadDay(availableDates[idx - 1]);
    });
    window.addEventListener("hashchange", () => {
      const hash = location.hash.slice(1);
      if (hash && hash !== currentDate && availableDates.includes(hash)) loadDay(hash);
    });

    loadDates().catch(e => { elStatus.textContent = `Could not reach API: ${e.message}`; });
  </script>
</body>
</html>
