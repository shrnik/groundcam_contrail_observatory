cameras:
  - name: "UW-Madison East"
    lat: 43.0706
    lon: -89.4069
    alt: 325.0
    side: east
    timezone: "America/Chicago"
    params_path: calibration_data/uwisc/east/camera_params.json
    image_dir_base_url: "https://metobs.ssec.wisc.edu/pub/cache/aoss/cameras"
    poll_interval_s: 120
  - name: "UW-Madison South"
    lat: 43.0706
    lon: -89.4069
    alt: 325.0
    side: south
    timezone: "America/Chicago"
    params_path: calibration_data/uwisc/south/camera_params.json
    image_dir_base_url: "https://metobs.ssec.wisc.edu/pub/cache/aoss/cameras"
    poll_interval_s: 120

adsb:
  radius_km: 80
  poll_interval_s: 10
  max_age_s: 600
  min_alt_m: 2438.4   # 8000 ft

detection:
  max_range_km: 80
  min_line_length: 40.0

alerts:
  ttl_s: 300

analytics:
  output_dir: live_output

azure:
  container: contrail-frames
  # connection_string: "DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...;EndpointSuffix=core.windows.net"
  # Falls back to AZURE_STORAGE_CONNECTION_STRING env var if not set here.
